<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BounceElite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://picsum.photos/seed/loginbg/1920/1080');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 2;
        }
        .social-btn {
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            color: var(--text-main);
            transition: var(--transition);
        }
        .social-btn:hover {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>
    <div class="position-absolute top-0 end-0 p-4 z-3">
        <button class="theme-toggle btn btn-sm btn-outline-light me-2"><i class="bi bi-moon-fill"></i></button>
        <button class="rtl-toggle btn btn-sm btn-outline-light">RTL</button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-overlay"></div>
        <div class="auth-card zoom-in">
            <div class="glass-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="fs-3 fw-bold text-decoration-none">
                        <i class="bi bi-balloon-fill text-primary"></i> <span class="text-white">Bounce</span><span class="text-primary">Elite</span>
                    </a>
                    <p class="text-white-50 mt-2">Welcome back! Please login to your account.</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label text-white small fw-bold">Email Address</label>
                        <input type="email" class="form-control bg-white bg-opacity-10 border-light text-white py-2" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label class="form-label text-white small fw-bold">Password</label>
                            <a href="#" class="text-primary small text-decoration-none">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <input type="password" class="form-control bg-white bg-opacity-10 border-light text-white py-2" id="pwdInput" placeholder="Enter password" required>
                            <button class="btn btn-outline-light" type="button" onclick="const pwd = document.getElementById('pwdInput'); pwd.type = pwd.type === 'password' ? 'text' : 'password'; this.querySelector('i').classList.toggle('bi-eye-slash'); this.querySelector('i').classList.toggle('bi-eye');">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-white-50 small" for="rememberMe">Remember me</label>
                    </div>
                    <button type="submit" class="btn-premium w-100 mb-4">Sign In</button>
                </form>

                <div class="position-relative mb-4">
                    <hr class="text-white-50">
                    <span class="position-absolute top-50 start-50 translate-middle px-2 text-white-50 small" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">Or continue with</span>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn social-btn py-2 d-flex justify-content-center align-items-center gap-2">
                        <i class="bi bi-google text-danger"></i> Google
                    </button>
                    <button class="btn social-btn py-2 d-flex justify-content-center align-items-center gap-2">
                        <i class="bi bi-apple"></i> Apple
                    </button>
                </div>

                <p class="text-center text-white-50 mt-4 mb-0 small">Don't have an account? <a href="signup.html" class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
